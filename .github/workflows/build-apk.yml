name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev build-essential \
            git autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev \
            openjdk-17-jdk-headless \
            unzip zip wget curl \
            libltdl-dev

      - name: Install Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36

      - name: Install Buildozer
        run: |
          pip install buildozer

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Verify buildozer.spec
        run: |
          test -f buildozer.spec && echo "spec found" || (echo "spec missing" && exit 1)
          test -f android_main.py && echo "android_main.py found" || (echo "android_main.py missing" && exit 1)

      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 60